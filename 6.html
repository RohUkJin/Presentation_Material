<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>06. 데모·시연 - 핫딜연구소</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Noto Sans KR', sans-serif;
        background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
        overflow: hidden;
    }
    .slide-container {
        width: 1280px;
        height: 720px;
        position: relative;
        background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
        overflow: hidden;
    }
    .demo-panel {
        background: white;
        border-radius: 18px;
        border: 1px solid #e2e8f0;
        box-shadow: 0 4px 24px rgba(15, 23, 42, 0.06);
    }
    .check-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 18px;
        border-radius: 12px;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        font-size: 15px;
        color: #334155;
    }
    .browser-chrome {
        background: #1e293b;
        border-radius: 12px 12px 0 0;
        padding: 10px 14px;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .mock-screen {
        border-radius: 0 0 12px 12px;
        background: #f1f5f9;
        border: 1px solid #e2e8f0;
        border-top: 0;
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
    }
    .mock-screen iframe {
        flex: 1;
        width: 100%;
        border: 0;
        background: #fff;
    }
    .live-banner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 14px;
        background: #1e293b;
        border-top: 1px solid #334155;
    }
    .live-url {
        font-size: 12px;
        color: #94a3b8;
        word-break: break-all;
        flex: 1;
    }
    .live-btn {
        flex-shrink: 0;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        font-size: 13px;
        font-weight: 700;
        color: #fff;
        background: #667eea;
        border-radius: 8px;
        text-decoration: none;
        border: 1px solid #5a67d8;
    }
    .live-btn:hover { background: #5a67d8; }
</style>
</head>
<body>
<div class="slide-container">

<div style="display: flex; justify-content: space-between; align-items: flex-end; gap: 24px;">
<div style="min-width: 0;">
<h1 style="font-size: 38px; font-weight: 800; color: #1e293b; margin: 0 0 8px 0;">
<span style="color: #667eea;">06.</span> 데모 · 시연
</h1>
<p style="font-size: 18px; font-weight: 500; color: #64748b; margin: 0; line-height: 1.45;">프로덕션은 <strong style="color:#475569;">Vercel</strong>에 배포되어 있습니다. 아래 URL로 라이브 시연하세요.</p>

<div style="text-align: right; flex-shrink: 0; width: 260px; box-sizing: border-box;">

<div style="font-size: 24px; font-weight: 800; color: #667eea; margin-top: 4px; line-height: 1.15;">라이브</div>
</div>
</div>

<div style="position: absolute; left: -40px; bottom: -40px; width: 220px; height: 220px; opacity: 0.06; background: radial-gradient(circle, #764ba2 0%, transparent 70%); border-radius: 50%; pointer-events: none;"></div>
